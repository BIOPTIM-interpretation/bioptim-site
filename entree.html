<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bioptim | Accès</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f14;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      text-align: center;
      max-width: 500px;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #aaa;
      margin-bottom: 30px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .patient {
      background: #2d6cdf;
    }

    .labo {
      background: #1f9d6a;
    }
  </style>
</head>

<body>

  <div class="box">

    <h1>Bioptim</h1>
    <p>Choisissez votre profil</p>

    <!-- PATIENT -->
    <a class="btn patient" href="analyses.html"
       onclick="localStorage.setItem('mode','patient')">
      Je suis un patient
    </a>

    <!-- LABO -->
    <a class="btn labo" href="index.html"
       onclick="localStorage.setItem('mode','labo')">
      Je suis un laboratoire
    </a>

  </div>
</body>
</html>
