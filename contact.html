<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact | Bioptim</title>
  <meta name="description" content="Contacter Bioptim pour une demonstration ou une question.">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- HEADER injecté -->
  <div id="header"></div>

  <script>
    fetch("/header.html")
      .then(r => {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.text();
      })
      .then(data => {
        document.getElementById("header").innerHTML = data;
      })
      .catch(err => console.error("Erreur header:", err));
  </script>

  <main>

    <section class="page-title">
      <div class="section-inner">
        <span class="eyebrow">Contact</span>
        <h1>Parlons de Bioptim</h1>
        <p class="lead">
          Une question, une demande de demonstration ou un projet pilote avec un laboratoire ?
        </p>
      </div>
    </section>

    <section>
      <div class="section-inner split">

        <form class="card form" data-demo-form>
          <label>
            Nom
            <input type="text" name="name" required>
          </label>

          <label>
            Email
            <input type="email" name="email" required>
          </label>

          <label>
            Message
            <textarea name="message" required></textarea>
          </label>

          <button class="button button-primary" type="submit">Envoyer</button>
          <p data-form-message aria-live="polite"></p>
        </form>

        <div class="grid">

          <article class="card">
            <h3>Email de contact</h3>
            <p><a href="mailto:contact@bioptim.fr">bioptim@gmail.com</a></p>
          </article>

          <article class="card">
            <h3>LinkedIn Bioptim</h3>
            <p><a href="https://www.linkedin.com/company/bioptim">linkedin.com/in/bokobza-joey-292b713b9</a></p>
          </article>

        </div>

      </div>
    </section>

  </main>

  <div id="footer"></div>

<script>
fetch("footer.html")
  .then(r => r.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });
</script>

  <script src="script.js"></script>

</body>
</html>
